#  Networks 
networks:
  istore_network:
    driver: bridge

#  Services 
services:

  #  FastAPI Backend 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: istore_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      API_BASE_URL: "http://backend:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - istore_network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  #  Next.js Frontend 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    container_name: istore_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - istore_network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
